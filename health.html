<!-- public/health.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workflow Engine Health</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0b0e;
            color: #e5e7eb;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .status {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .status-card {
            background: #1f2937;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        .status-indicator {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            margin: 0 auto 10px;
        }
        .healthy { background: #10b981; }
        .warning { background: #f59e0b; }
        .error { background: #ef4444; }
        .metrics {
            background: #1f2937;
            padding: 20px;
            border-radius: 8px;
        }
        .metric-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #374151;
        }
        .metric-row:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Workflow Engine Health Status</h1>
            <p>Last updated: <span id="last-updated">-</span></p>
        </div>
        
        <div class="status" id="status-grid">
            <!-- Status cards will be inserted here -->
        </div>
        
        <div class="metrics">
            <h2>System Metrics</h2>
            <div id="metrics-list">
                <!-- Metrics will be inserted here -->
            </div>
        </div>
    </div>
    
    <script>
        async function checkHealth() {
            try {
                const response = await fetch('/api/monitoring/dashboard');
                const data = await response.json();
                
                updateStatus(data);
                updateMetrics(data);
                
                document.getElementById('last-updated').textContent = 
                    new Date().toLocaleString();
            } catch (error) {
                console.error('Health check failed:', error);
                showError();
            }
        }
        
        function updateStatus(data) {
            const statusGrid = document.getElementById('status-grid');
            statusGrid.innerHTML = '';
            
            // API Status
            addStatusCard(statusGrid, 'API', 'healthy', 'Operational');
            
            // CPU Status
            const cpuStatus = data.system.current.cpu.percent > 90 ? 'error' : 
                             data.system.current.cpu.percent > 70 ? 'warning' : 'healthy';
            addStatusCard(statusGrid, 'CPU', cpuStatus, 
                         `${data.system.current.cpu.percent.toFixed(1)}%`);
            
            // Memory Status
            const memStatus = data.system.current.memory.percent > 90 ? 'error' : 
                             data.system.current.memory.percent > 70 ? 'warning' : 'healthy';
            addStatusCard(statusGrid, 'Memory', memStatus, 
                         `${data.system.current.memory.percent.toFixed(1)}%`);
            
            // Workflows Status
            const workflowStatus = data.workflows.totalActive > 0 ? 'healthy' : 'warning';
            addStatusCard(statusGrid, 'Workflows', workflowStatus, 
                         `${data.workflows.totalActive} active`);
        }
        
        function addStatusCard(container, title, status, value) {
            const card = document.createElement('div');
            card.className = 'status-card';
            card.innerHTML = `
                <div class="status-indicator ${status}"></div>
                <h3>${title}</h3>
                <p>${value}</p>
            `;
            container.appendChild(card);
        }
        
        function updateMetrics(data) {
            const metricsList = document.getElementById('metrics-list');
            metricsList.innerHTML = '';
            
            addMetric(metricsList, 'Total Workflows', 
                     data.workflows.workflows.length);
            addMetric(metricsList, 'Active Executions', 
                     data.workflows.totalActive);
            addMetric(metricsList, 'Disk Usage', 
                     `${data.system.current.disk.percent.toFixed(1)}%`);
            addMetric(metricsList, 'Network Sent', 
                     formatBytes(data.system.current.network.bytesSent));
            addMetric(metricsList, 'Network Received', 
                     formatBytes(data.system.current.network.bytesRecv));
        }
        
        function addMetric(container, label, value) {
            const row = document.createElement('div');
            row.className = 'metric-row';
            row.innerHTML = `
                <span>${label}</span>
                <strong>${value}</strong>
            `;
            container.appendChild(row);
        }
        
        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        function showError() {
            const statusGrid = document.getElementById('status-grid');
            statusGrid.innerHTML = '<div class="status-card"><div class="status-indicator error"></div><h3>Error</h3><p>Unable to fetch health data</p></div>';
        }
        
        // Check health on load and every 30 seconds
        checkHealth();
        setInterval(checkHealth, 30000);
    </script>
</body>
</html>
